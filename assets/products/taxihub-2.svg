    <circle cx="44" cy="40" r="24" fill="#FFD60A"/>
    <text x="44" y="46" fill="#0A0A0F" font-size="16" font-weight="800" text-anchor="middle">MK</text>
    <text x="80" y="32" fill="#fff" font-size="14" font-weight="700">Mehmet K.</text>
    <text x="80" y="46" fill="rgba(255,255,255,0.6)" font-size="10">Toyota Prius · W-94821</text>
    <text x="80" y="60" fill="#FFD60A" font-size="11">★ 4,92 · 1,4k Fahrten</text>
    <rect x="194" y="30" width="36" height="22" rx="6" fill="#34C759"/>
    <text x="212" y="44" fill="#0A0A0F" font-size="10" font-weight="700" text-anchor="middle">Anruf</text>

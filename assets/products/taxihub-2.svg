<svg viewBox="0 0 280 560" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="280" height="560" rx="36" fill="#0A0A0F"/>
  <text x="22" y="32" fill="#fff" font-family="-apple-system" font-size="12" font-weight="600">9:41</text>
  <rect x="248" y="24" width="14" height="8" rx="2" fill="#fff" opacity="0.8"/>

  <text x="22" y="74" fill="#FFD60A" font-size="10" font-weight="600" letter-spacing="2">FAHRT BESTÄTIGEN</text>
  <text x="22" y="98" fill="#fff" font-family="-apple-system" font-size="22" font-weight="700">€&#8201;42,00</text>

  <!-- Trip details -->
  <g transform="translate(20, 124)">
    <rect width="240" height="100" rx="14" fill="rgba(255,255,255,0.06)"/>
    <circle cx="22" cy="30" r="6" fill="#34C759"/>
    <line x1="22" y1="40" x2="22" y2="70" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-dasharray="2,3"/>
    <rect x="18" y="74" width="8" height="8" rx="2" fill="#FFD60A"/>

    <text x="42" y="22" fill="rgba(255,255,255,0.5)" font-size="9" letter-spacing="1">PICKUP</text>
    <text x="42" y="38" fill="#fff" font-size="13" font-weight="600">Bäckerstraße 7</text>
    <text x="42" y="52" fill="rgba(255,255,255,0.6)" font-size="10">1010 Wien</text>

    <text x="42" y="68" fill="rgba(255,255,255,0.5)" font-size="9" letter-spacing="1">DESTINATION</text>
    <text x="42" y="84" fill="#fff" font-size="13" font-weight="600">Flughafen Wien · VIE</text>
    <text x="42" y="98" fill="rgba(255,255,255,0.6)" font-size="10">Terminal 3 · 27 km</text>
  </g>

  <!-- Driver card -->
  <text x="22" y="252" fill="#FFD60A" font-size="10" font-weight="600" letter-spacing="2">IHR FAHRER</text>
  <g transform="translate(20, 268)">

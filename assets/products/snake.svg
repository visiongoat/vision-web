<svg viewBox="0 0 280 560" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <radialGradient id="sn-bg" cx="0.5" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#0F3B22"/>
      <stop offset="1" stop-color="#020A07"/>
    </radialGradient>
    <linearGradient id="sn-snake1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1DB954"/>
      <stop offset="1" stop-color="#0AAB47"/>
    </linearGradient>
    <linearGradient id="sn-snake2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD60A"/>
      <stop offset="1" stop-color="#FF9500"/>
    </linearGradient>
    <linearGradient id="sn-snake3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF375F"/>
      <stop offset="1" stop-color="#BF0F38"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="280" height="560" rx="36" fill="url(#sn-bg)"/>

  <text x="22" y="32" fill="#fff" font-family="-apple-system" font-size="12" font-weight="600">9:41</text>
  <rect x="248" y="24" width="14" height="8" rx="2" fill="#fff" opacity="0.8"/>

  <!-- Top HUD -->
  <text x="22" y="74" fill="rgba(29,185,84,0.7)" font-family="-apple-system" font-size="10" letter-spacing="2.5" font-weight="700">LIVE ARENA · EU-1</text>
  <text x="22" y="100" fill="#fff" font-family="-apple-system" font-size="22" font-weight="800" letter-spacing="-0.5">Rank #3 · 4,820</text>

  <!-- Player avatars -->
  <g transform="translate(180, 76)">
    <circle cx="0" cy="0" r="11" fill="#1DB954"/>
    <text x="0" y="3" fill="#fff" font-family="-apple-system" font-size="10" font-weight="800" text-anchor="middle">U</text>
    <circle cx="20" cy="0" r="11" fill="#FF375F"/>
    <text x="20" y="3" fill="#fff" font-family="-apple-system" font-size="10" font-weight="800" text-anchor="middle">K</text>
    <circle cx="40" cy="0" r="11" fill="#FFD60A"/>
    <text x="40" y="3" fill="#0A0A0F" font-family="-apple-system" font-size="10" font-weight="800" text-anchor="middle">L</text>
    <circle cx="60" cy="0" r="11" fill="rgba(255,255,255,0.15)"/>
    <text x="60" y="3" fill="#fff" font-family="-apple-system" font-size="9" font-weight="700" text-anchor="middle">+7</text>
  </g>

  <!-- Arena (game zone) -->
  <g transform="translate(20, 130)">
    <rect width="240" height="280" rx="18" fill="rgba(0,0,0,0.4)" stroke="rgba(29,185,84,0.25)" stroke-width="1"/>

    <!-- Grid background -->
    <g opacity="0.07" stroke="#1DB954" stroke-width="0.5">
      <line x1="0" y1="40" x2="240" y2="40"/>
      <line x1="0" y1="80" x2="240" y2="80"/>
      <line x1="0" y1="120" x2="240" y2="120"/>
      <line x1="0" y1="160" x2="240" y2="160"/>
      <line x1="0" y1="200" x2="240" y2="200"/>
      <line x1="0" y1="240" x2="240" y2="240"/>
      <line x1="40" y1="0" x2="40" y2="280"/>
      <line x1="80" y1="0" x2="80" y2="280"/>
      <line x1="120" y1="0" x2="120" y2="280"/>
      <line x1="160" y1="0" x2="160" y2="280"/>
      <line x1="200" y1="0" x2="200" y2="280"/>
    </g>

    <!-- Food pellets -->
    <circle cx="46" cy="60" r="4" fill="#FFD60A" filter="url(#glow)"/>
    <circle cx="200" cy="110" r="4" fill="#FFD60A" filter="url(#glow)"/>
    <circle cx="180" cy="220" r="4" fill="#FFD60A" filter="url(#glow)"/>
    <circle cx="70" cy="240" r="4" fill="#FFD60A" filter="url(#glow)"/>

    <!-- Power-up -->
    <rect x="100" y="50" width="10" height="10" rx="2" fill="#FF375F" filter="url(#glow)"/>

    <!-- Player snake (green - longest) -->
    <g filter="url(#glow)">
      <path d="M120,140 C 120,100 80,100 80,60 C 80,20 130,20 130,80 C 130,140 200,140 200,200 C 200,260 120,260 120,210"
            stroke="url(#sn-snake1)" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
      <!-- Head -->
      <circle cx="120" cy="210" r="9" fill="#1DB954"/>
      <circle cx="124" cy="207" r="2" fill="#fff"/>
      <circle cx="117" cy="207" r="2" fill="#fff"/>
    </g>

    <!-- Opponent 1 - red snake -->
    <g filter="url(#glow)">
      <path d="M30,170 Q60,150 50,120 Q40,90 70,80" stroke="url(#sn-snake3)" stroke-width="11" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
      <circle cx="70" cy="80" r="7" fill="#FF375F"/>
    </g>

    <!-- Opponent 2 - yellow snake -->
    <g filter="url(#glow)">
      <path d="M170,40 Q200,55 220,40 Q230,75 200,90" stroke="url(#sn-snake2)" stroke-width="11" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
      <circle cx="200" cy="90" r="7" fill="#FFD60A"/>
    </g>
  </g>

  <!-- HUD bottom -->
  <rect x="20" y="426" width="240" height="60" rx="16" fill="rgba(29,185,84,0.10)" stroke="rgba(29,185,84,0.20)"/>
  <text x="38" y="448" fill="rgba(255,255,255,0.55)" font-family="-apple-system" font-size="9" letter-spacing="1.5" font-weight="600">MXR EARNED</text>
  <text x="38" y="469" fill="#1DB954" font-family="-apple-system" font-size="20" font-weight="800">+ 142</text>
  <circle cx="222" cy="456" r="14" fill="#1DB954"/>
  <text x="222" y="461" fill="#020A07" font-family="-apple-system" font-size="12" font-weight="800" text-anchor="middle">M</text>

  <!-- Controls -->
  <circle cx="60" cy="520" r="22" fill="rgba(255,255,255,0.10)"/>
  <path d="M50 520 L70 520 M60 510 L60 530" stroke="#fff" stroke-width="2" stroke-linecap="round"/>

  <rect x="100" y="498" width="80" height="44" rx="22" fill="#1DB954"/>
  <text x="140" y="525" fill="#fff" font-family="-apple-system" font-size="13" font-weight="800" text-anchor="middle">BOOST</text>

  <circle cx="220" cy="520" r="22" fill="rgba(255,255,255,0.10)"/>
  <path d="M214 520 L226 520 M220 514 L220 526" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
</svg>

<svg viewBox="0 0 280 560" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="es-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001F3F"/>
      <stop offset="0.5" stop-color="#0050AA"/>
      <stop offset="1" stop-color="#0071E3"/>
    </linearGradient>
    <linearGradient id="es-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5BA8FF" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#0071E3" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="es-globe" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#4DA6FF"/>
      <stop offset="0.7" stop-color="#0066CC"/>
      <stop offset="1" stop-color="#001F3F"/>
    </radialGradient>
  </defs>

  <rect width="280" height="560" rx="36" fill="url(#es-bg)"/>
  <rect width="280" height="560" rx="36" fill="url(#es-glow)" opacity="0.4"/>

  <text x="22" y="32" fill="#fff" font-family="-apple-system" font-size="12" font-weight="600">9:41</text>
  <rect x="248" y="24" width="14" height="8" rx="2" fill="#fff" opacity="0.8"/>

  <!-- Header -->
  <text x="140" y="80" fill="rgba(255,255,255,0.6)" font-family="-apple-system" font-size="10" letter-spacing="2.5" font-weight="600" text-anchor="middle">CONNECT IN</text>
  <text x="140" y="116" fill="#fff" font-family="-apple-system" font-size="34" font-weight="700" letter-spacing="-1" text-anchor="middle">202+ Countries</text>
  <text x="140" y="138" fill="rgba(255,255,255,0.7)" font-family="-apple-system" font-size="12" text-anchor="middle">2-minute eSIM activation</text>

  <!-- Globe -->
  <g transform="translate(140, 280)">
    <circle r="92" fill="url(#es-globe)" opacity="0.95"/>

    <!-- Latitude lines -->
    <ellipse cx="0" cy="0" rx="92" ry="22" stroke="rgba(255,255,255,0.25)" stroke-width="0.8" fill="none"/>
    <ellipse cx="0" cy="0" rx="92" ry="45" stroke="rgba(255,255,255,0.18)" stroke-width="0.8" fill="none"/>
    <ellipse cx="0" cy="0" rx="92" ry="70" stroke="rgba(255,255,255,0.12)" stroke-width="0.8" fill="none"/>

    <!-- Longitude lines (rotated ellipses) -->
    <ellipse cx="0" cy="0" rx="22" ry="92" stroke="rgba(255,255,255,0.20)" stroke-width="0.8" fill="none"/>
    <ellipse cx="0" cy="0" rx="45" ry="92" stroke="rgba(255,255,255,0.15)" stroke-width="0.8" fill="none"/>
    <ellipse cx="0" cy="0" rx="70" ry="92" stroke="rgba(255,255,255,0.10)" stroke-width="0.8" fill="none"/>

    <!-- Connection points -->
    <circle cx="-25" cy="-30" r="3" fill="#FF6B5C"/>
    <circle cx="-25" cy="-30" r="6" fill="#FF6B5C" opacity="0.3"/>

    <circle cx="35" cy="-20" r="3" fill="#34C759"/>
    <circle cx="35" cy="-20" r="6" fill="#34C759" opacity="0.3"/>

    <circle cx="0" cy="40" r="3" fill="#FFD60A"/>
    <circle cx="0" cy="40" r="6" fill="#FFD60A" opacity="0.3"/>

    <circle cx="-50" cy="20" r="3" fill="#fff"/>
    <circle cx="60" cy="35" r="3" fill="#5BA8FF"/>

    <!-- Connecting arcs -->
    <path d="M-25,-30 Q5,-50 35,-20" stroke="#fff" stroke-width="0.8" fill="none" opacity="0.4" stroke-dasharray="2,2"/>
    <path d="M35,-20 Q40,15 0,40" stroke="#fff" stroke-width="0.8" fill="none" opacity="0.4" stroke-dasharray="2,2"/>
  </g>

  <!-- Bottom card -->
  <rect x="20" y="430" width="240" height="100" rx="22" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <text x="36" y="456" fill="rgba(255,255,255,0.6)" font-family="-apple-system" font-size="9" letter-spacing="1.5" font-weight="600">CURRENT PLAN</text>
  <text x="36" y="476" fill="#fff" font-family="-apple-system" font-size="15" font-weight="700">United States · 5GB</text>
  <text x="36" y="494" fill="rgba(255,255,255,0.7)" font-family="-apple-system" font-size="11">14 days · activated 2h ago</text>

  <rect x="36" y="504" width="208" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="36" y="504" width="62" height="6" rx="3" fill="#34C759"/>
</svg>

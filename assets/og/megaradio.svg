<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A0508"/>
      <stop offset="0.6" stop-color="#3A0810"/>
      <stop offset="1" stop-color="#5B0A12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.75" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#E11D2A" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#E11D2A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <text x="80" y="90" font-family="-apple-system, Inter" font-size="18" font-weight="500" fill="#FF6B5C" letter-spacing="3">MEGARADIO · BY VISION GO</text>
  <text x="80" y="240" font-family="-apple-system, Inter" font-size="88" font-weight="600" fill="#fff" letter-spacing="-3">Die ganze Welt</text>
  <text x="80" y="340" font-family="-apple-system, Inter" font-size="88" font-weight="600" fill="#fff" letter-spacing="-3">im Radio.</text>
  <text x="80" y="420" font-family="-apple-system, Inter" font-size="24" fill="rgba(255,255,255,0.75)" letter-spacing="-0.3">100.000+ Live-Stationen · FM · AM · Internet</text>
  <text x="80" y="455" font-family="-apple-system, Inter" font-size="24" fill="rgba(255,255,255,0.75)" letter-spacing="-0.3">iOS · Android · CarPlay · Android Auto</text>

  <!-- Vision GO mark right -->

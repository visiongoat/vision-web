<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="t-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1D1D1F"/><stop offset="1" stop-color="#0A0A0F"/></linearGradient>
    <linearGradient id="t-screen" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#001F3F"/><stop offset="1" stop-color="#0071E3"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#t-bg)"/>
  <!-- Brick wall texture -->
  <g opacity="0.07">
    <rect x="0" y="50" width="800" height="40" fill="#FFFFFF"/>
    <rect x="0" y="130" width="800" height="40" fill="#FFFFFF"/>
    <rect x="0" y="210" width="800" height="40" fill="#FFFFFF"/>
  </g>
  <!-- Window with city skyline (Vienna) -->
  <rect x="60" y="80" width="280" height="220" fill="#0A0A0F" stroke="#3A3A3D" stroke-width="2"/>
  <line x1="200" y1="80" x2="200" y2="300" stroke="#3A3A3D"/>
  <line x1="60" y1="190" x2="340" y2="190" stroke="#3A3A3D"/>
  <!-- Vienna skyline silhouette -->
  <path d="M60 250 L80 250 L80 220 L100 220 L100 240 L140 240 L140 210 L160 210 L160 230 L180 230 L180 250 L60 250 Z" fill="#001F3F"/>
  <!-- Stephansdom-ish spire -->
  <path d="M210 250 L210 200 L215 180 L220 200 L220 250 Z" fill="#001F3F"/>
  <path d="M225 250 L225 230 L260 230 L260 250 Z" fill="#001F3F"/>
  <path d="M270 250 L270 210 L290 210 L290 225 L320 225 L320 250 Z" fill="#001F3F"/>
  <!-- Window light pattern (warm glow) -->
  <rect x="60" y="80" width="280" height="220" fill="url(#t-screen)" opacity="0.3"/>
  <!-- Large monitor with diagram -->
  <rect x="430" y="120" width="280" height="170" rx="6" fill="#0A0A0F" stroke="#3A3A3D" stroke-width="2"/>
  <rect x="438" y="128" width="264" height="154" rx="3" fill="#001F3F"/>
  <!-- Diagram on monitor -->
  <circle cx="490" cy="180" r="18" fill="#FF6B5C"/>
  <text x="490" y="184" font-family="Inter" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">RAG</text>
  <circle cx="570" cy="180" r="18" fill="#34C759"/>
  <text x="570" y="184" font-family="Inter" font-size="10" font-weight="700" fill="#062014" text-anchor="middle">API</text>
  <circle cx="650" cy="180" r="18" fill="#A78BFA"/>
  <text x="650" y="184" font-family="Inter" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">DB</text>
  <line x1="508" y1="180" x2="552" y2="180" stroke="#fff" stroke-width="1.5"/>
  <line x1="588" y1="180" x2="632" y2="180" stroke="#fff" stroke-width="1.5"/>
  <circle cx="490" cy="230" r="14" fill="#FFD60A"/>
  <circle cx="570" cy="230" r="14" fill="#7DD3FC"/>
  <circle cx="650" cy="230" r="14" fill="#FF375F"/>
  <line x1="490" y1="216" x2="490" y2="198" stroke="#fff" stroke-width="1"/>
  <line x1="570" y1="216" x2="570" y2="198" stroke="#fff" stroke-width="1"/>
  <line x1="650" y1="216" x2="650" y2="198" stroke="#fff" stroke-width="1"/>
  <text x="570" y="270" font-family="JetBrains Mono" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">VG-ARCH-2026-Q2</text>
  <!-- Monitor stand -->
  <rect x="555" y="290" width="30" height="20" fill="#1D1D1F"/>
  <rect x="540" y="308" width="60" height="6" rx="2" fill="#1D1D1F"/>
  <!-- Long desk -->
  <rect x="0" y="380" width="800" height="20" fill="#5B3B1F"/>
  <rect x="0" y="380" width="800" height="4" fill="#7A5024"/>
  <!-- Chairs (silhouette) -->
  <rect x="100" y="420" width="60" height="80" rx="6" fill="#1D1D1F"/>
  <rect x="100" y="500" width="6" height="80" fill="#0A0A0F"/>
  <rect x="154" y="500" width="6" height="80" fill="#0A0A0F"/>
  <rect x="250" y="420" width="60" height="80" rx="6" fill="#1D1D1F"/>
  <rect x="250" y="500" width="6" height="80" fill="#0A0A0F"/>
  <rect x="304" y="500" width="6" height="80" fill="#0A0A0F"/>
  <rect x="400" y="420" width="60" height="80" rx="6" fill="#1D1D1F"/>
  <rect x="400" y="500" width="6" height="80" fill="#0A0A0F"/>
  <rect x="454" y="500" width="6" height="80" fill="#0A0A0F"/>
  <rect x="550" y="420" width="60" height="80" rx="6" fill="#1D1D1F"/>
  <rect x="550" y="500" width="6" height="80" fill="#0A0A0F"/>
  <rect x="604" y="500" width="6" height="80" fill="#0A0A0F"/>
  <!-- MacBooks on desk -->
  <rect x="105" y="378" width="50" height="4" fill="#3A3A3D"/>
  <rect x="255" y="378" width="50" height="4" fill="#3A3A3D"/>
  <rect x="405" y="378" width="50" height="4" fill="#3A3A3D"/>
  <rect x="555" y="378" width="50" height="4" fill="#3A3A3D"/>
  <!-- Floor -->
  <rect x="0" y="500" width="800" height="100" fill="#0A0A0F"/>
</svg>

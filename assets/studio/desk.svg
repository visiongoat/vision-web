<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="d-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F5F5F7"/><stop offset="1" stop-color="#E8E8ED"/></linearGradient>
    <linearGradient id="d-desk" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8B7355"/><stop offset="1" stop-color="#6B5740"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#d-bg)"/>
  <!-- Wall texture -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="rgba(0,0,0,0.04)"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="rgba(0,0,0,0.04)"/>
  <!-- Desk -->
  <rect x="0" y="400" width="800" height="200" fill="url(#d-desk)"/>
  <rect x="0" y="400" width="800" height="8" fill="#9B8366"/>
  <!-- Window with light -->
  <rect x="500" y="50" width="220" height="300" fill="#E8F0F7" stroke="#D2D2D7" stroke-width="2"/>
  <line x1="610" y1="50" x2="610" y2="350" stroke="#D2D2D7"/>
  <line x1="500" y1="200" x2="720" y2="200" stroke="#D2D2D7"/>
  <!-- MacBook -->
  <rect x="80" y="280" width="240" height="160" rx="6" fill="#1D1D1F"/>
  <rect x="92" y="292" width="216" height="124" rx="2" fill="#000"/>
  <!-- Code lines on screen -->
  <rect x="100" y="300" width="50" height="3" rx="1" fill="#7DD3FC"/>
  <rect x="155" y="300" width="30" height="3" rx="1" fill="#A78BFA"/>
  <rect x="100" y="310" width="80" height="3" rx="1" fill="#F0EDE5" opacity="0.5"/>
  <rect x="110" y="320" width="60" height="3" rx="1" fill="#5EEAD4"/>
  <rect x="100" y="330" width="100" height="3" rx="1" fill="#FF6B5C"/>
  <rect x="120" y="340" width="40" height="3" rx="1" fill="#FFD60A"/>
  <rect x="100" y="350" width="70" height="3" rx="1" fill="#7DD3FC"/>
  <rect x="100" y="360" width="50" height="3" rx="1" fill="#F0EDE5" opacity="0.5"/>
  <rect x="60" y="438" width="280" height="6" rx="2" fill="#0F0F12"/>
  <!-- iPhone -->
  <rect x="370" y="380" width="60" height="120" rx="10" fill="#2A2A2D"/>
  <rect x="375" y="388" width="50" height="100" rx="5" fill="#001F3F"/>
  <circle cx="400" cy="495" r="3" fill="rgba(255,255,255,0.3)"/>
  <!-- Coffee cup -->
  <ellipse cx="480" cy="410" rx="20" ry="6" fill="#4A2C1A"/>
  <path d="M460 410 L465 470 L495 470 L500 410 Z" fill="#FFFFFF" stroke="#D2D2D7"/>
  <ellipse cx="480" cy="412" rx="16" ry="4" fill="#3D2415"/>
  <!-- Notepad -->
  <rect x="540" y="410" width="100" height="60" rx="2" fill="#FFFFFF"/>
  <line x1="545" y1="425" x2="635" y2="425" stroke="#D2D2D7"/>
  <line x1="545" y1="435" x2="620" y2="435" stroke="#D2D2D7"/>
  <line x1="545" y1="445" x2="630" y2="445" stroke="#D2D2D7"/>
  <line x1="545" y1="455" x2="610" y2="455" stroke="#D2D2D7"/>
  <!-- Plant -->
  <rect x="680" y="370" width="40" height="50" rx="3" fill="#5B3B1F"/>
  <path d="M690 370 Q695 320 700 345 M700 370 Q706 310 712 335 M710 370 Q715 325 720 350" stroke="#15803D" stroke-width="3" stroke-linecap="round" fill="none"/>
  <ellipse cx="695" cy="335" rx="8" ry="14" fill="#15803D"/>
  <ellipse cx="706" cy="325" rx="9" ry="15" fill="#16A34A"/>
  <ellipse cx="716" cy="340" rx="8" ry="13" fill="#15803D"/>
</svg>

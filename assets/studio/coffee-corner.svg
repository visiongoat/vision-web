  <rect x="278" y="424" width="44" height="50" rx="4" fill="#FFFFFF"/>
  <ellipse cx="300" cy="430" rx="20" ry="4" fill="#3D2415"/>
  <ellipse cx="300" cy="432" rx="16" ry="3" fill="#5A3520"/>
  <!-- Counter -->
  <rect x="0" y="400" width="800" height="200" fill="url(#c-counter)"/>
  <rect x="0" y="400" width="800" height="6" fill="#5B3B1F"/>
  <!-- Coffee beans pile -->
  <g transform="translate(500 410)">
    <ellipse cx="0" cy="0" rx="40" ry="14" fill="#2A1A0F"/>
    <ellipse cx="-10" cy="-3" rx="8" ry="4" fill="#3D2415"/>
    <ellipse cx="5" cy="-2" rx="8" ry="4" fill="#3D2415"/>
    <ellipse cx="15" cy="-4" rx="7" ry="3" fill="#3D2415"/>
    <ellipse cx="-20" cy="-6" rx="7" ry="3" fill="#4A2C1A"/>
  </g>
  <!-- Pour-over setup -->
  <g transform="translate(620 380)">
    <ellipse cx="0" cy="0" rx="30" ry="6" fill="#1D1D1F"/>
    <path d="M-26 0 Q-30 30 -10 35 L10 35 Q30 30 26 0 Z" fill="#3A2415"/>
    <path d="M-20 5 Q-22 25 -5 30 L5 30 Q22 25 20 5 Z" fill="#5B3B1F"/>
    <ellipse cx="0" cy="5" rx="14" ry="3" fill="#2A1A0F"/>
  </g>
  <!-- "Coffee" sign -->
  <rect x="600" y="180" width="100" height="40" rx="4" fill="#1D1D1F"/>
  <text x="650" y="206" font-family="Inter" font-size="14" font-weight="700" fill="#FFD60A" text-anchor="middle">COFFEE</text>
</svg>

  <g transform="translate(150 130)">
    <rect x="0" y="0" width="32" height="50" rx="3" fill="#FFFFFF"/>
    <ellipse cx="16" cy="0" rx="16" ry="3" fill="#F0EDE5"/>
    <path d="M32 15 Q48 15 48 30 Q48 45 32 45" stroke="#FFFFFF" stroke-width="3" fill="none"/>
    <text x="16" y="32" font-family="JetBrains Mono" font-size="9" fill="#1D1D1F" text-anchor="middle">VG</text>
  </g>
  <g transform="translate(220 130)">
    <rect x="0" y="0" width="32" height="50" rx="3" fill="#0A0A0F"/>
    <ellipse cx="16" cy="0" rx="16" ry="3" fill="#1D1D1F"/>
    <path d="M32 15 Q48 15 48 30 Q48 45 32 45" stroke="#0A0A0F" stroke-width="3" fill="none"/>
  </g>
  <g transform="translate(290 130)">
    <rect x="0" y="0" width="32" height="50" rx="3" fill="#FF6B5C"/>
    <ellipse cx="16" cy="0" rx="16" ry="3" fill="#FF8A7A"/>
    <path d="M32 15 Q48 15 48 30 Q48 45 32 45" stroke="#FF6B5C" stroke-width="3" fill="none"/>
  </g>
  <g transform="translate(360 130)">
    <rect x="0" y="0" width="32" height="50" rx="3" fill="#FFD60A"/>
    <ellipse cx="16" cy="0" rx="16" ry="3" fill="#FFE066"/>
    <path d="M32 15 Q48 15 48 30 Q48 45 32 45" stroke="#FFD60A" stroke-width="3" fill="none"/>
  </g>
  <g transform="translate(430 130)">
    <rect x="0" y="0" width="32" height="50" rx="3" fill="#34C759"/>
    <ellipse cx="16" cy="0" rx="16" ry="3" fill="#5EEAD4"/>
    <path d="M32 15 Q48 15 48 30 Q48 45 32 45" stroke="#34C759" stroke-width="3" fill="none"/>
  </g>
  <g transform="translate(500 130)">
    <rect x="0" y="0" width="32" height="50" rx="3" fill="#88B7FF"/>
    <ellipse cx="16" cy="0" rx="16" ry="3" fill="#B8D3FF"/>
    <path d="M32 15 Q48 15 48 30 Q48 45 32 45" stroke="#88B7FF" stroke-width="3" fill="none"/>
  </g>
  <!-- Espresso machine -->
  <rect x="200" y="280" width="180" height="120" rx="6" fill="#1D1D1F"/>
  <rect x="200" y="280" width="180" height="6" fill="#3A3A3D"/>
  <circle cx="240" cy="320" r="14" fill="#3A3A3D" stroke="#5A5A5D" stroke-width="2"/>
  <circle cx="240" cy="320" r="6" fill="#0A0A0F"/>
  <circle cx="290" cy="320" r="14" fill="#3A3A3D" stroke="#5A5A5D" stroke-width="2"/>
  <circle cx="290" cy="320" r="6" fill="#FF6B5C"/>
  <rect x="220" y="350" width="140" height="6" rx="2" fill="#3A3A3D"/>

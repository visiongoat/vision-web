<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="c-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F5F0E8"/><stop offset="1" stop-color="#E8DFD0"/></linearGradient>
    <linearGradient id="c-counter" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3D2415"/><stop offset="1" stop-color="#2A1A0F"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#c-bg)"/>
  <!-- Wall pattern -->
  <line x1="0" y1="80" x2="800" y2="80" stroke="rgba(91,59,31,0.08)"/>
  <line x1="0" y1="160" x2="800" y2="160" stroke="rgba(91,59,31,0.08)"/>
  <!-- Shelf with mugs -->
  <rect x="100" y="180" width="600" height="6" fill="#5B3B1F"/>

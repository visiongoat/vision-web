<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="wb-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F5F5F7"/><stop offset="1" stop-color="#E0E0E5"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#wb-bg)"/>
  <!-- Whiteboard frame -->
  <rect x="80" y="60" width="640" height="380" rx="6" fill="#FAFAFA" stroke="#D2D2D7" stroke-width="3"/>
  <rect x="80" y="60" width="640" height="20" fill="#E0E0E5"/>
  <!-- Sticky notes -->
  <rect x="120" y="120" width="80" height="60" fill="#FFD60A" transform="rotate(-2 160 150)"/>
  <text x="160" y="152" font-family="Inter" font-size="10" font-weight="600" fill="#0A0A0F" text-anchor="middle">Auth</text>
  <text x="160" y="165" font-family="Inter" font-size="8" fill="#3A2D00" text-anchor="middle">Magic link</text>
  <rect x="220" y="110" width="80" height="60" fill="#FF6B5C" transform="rotate(1 260 140)"/>
  <text x="260" y="138" font-family="Inter" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">RAG</text>
  <text x="260" y="153" font-family="Inter" font-size="8" fill="rgba(255,255,255,0.8)" text-anchor="middle">pgvector</text>
  <rect x="320" y="125" width="80" height="60" fill="#88B7FF" transform="rotate(-1 360 155)"/>
  <text x="360" y="148" font-family="Inter" font-size="10" font-weight="600" fill="#001F3F" text-anchor="middle">Stripe</text>
  <text x="360" y="163" font-family="Inter" font-size="8" fill="#003580" text-anchor="middle">Subscriptions</text>
  <rect x="420" y="115" width="80" height="60" fill="#A78BFA" transform="rotate(2 460 145)"/>
  <text x="460" y="142" font-family="Inter" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Onboarding</text>
  <text x="460" y="157" font-family="Inter" font-size="8" fill="rgba(255,255,255,0.85)" text-anchor="middle">3 steps max</text>
  <rect x="520" y="130" width="80" height="60" fill="#34C759" transform="rotate(-1 560 160)"/>
  <text x="560" y="153" font-family="Inter" font-size="10" font-weight="600" fill="#062014" text-anchor="middle">Search</text>
  <text x="560" y="168" font-family="Inter" font-size="8" fill="rgba(6,32,20,0.85)" text-anchor="middle">Postgres FT</text>
  <!-- Arrows / connections -->
  <path d="M160 200 Q200 240 260 200" stroke="#1D1D1F" stroke-width="2" fill="none" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M260 220 Q320 250 360 220" stroke="#1D1D1F" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M360 230 Q420 260 460 220" stroke="#1D1D1F" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M460 230 Q520 260 560 230" stroke="#1D1D1F" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Architecture diagram (bottom) -->
  <rect x="120" y="290" width="120" height="50" rx="6" fill="#FFFFFF" stroke="#1D1D1F" stroke-width="2"/>
  <text x="180" y="320" font-family="JetBrains Mono" font-size="11" font-weight="600" fill="#0A0A0F" text-anchor="middle">Next.js</text>
  <rect x="280" y="290" width="120" height="50" rx="6" fill="#FFFFFF" stroke="#1D1D1F" stroke-width="2"/>
  <text x="340" y="320" font-family="JetBrains Mono" font-size="11" font-weight="600" fill="#0A0A0F" text-anchor="middle">tRPC</text>
  <rect x="440" y="290" width="120" height="50" rx="6" fill="#FFFFFF" stroke="#1D1D1F" stroke-width="2"/>
  <text x="500" y="320" font-family="JetBrains Mono" font-size="11" font-weight="600" fill="#0A0A0F" text-anchor="middle">Postgres</text>
  <rect x="600" y="290" width="100" height="50" rx="6" fill="#FFFFFF" stroke="#1D1D1F" stroke-width="2"/>
  <text x="650" y="320" font-family="JetBrains Mono" font-size="11" font-weight="600" fill="#0A0A0F" text-anchor="middle">Redis</text>
  <line x1="240" y1="315" x2="280" y2="315" stroke="#0A0A0F" stroke-width="2"/>
  <line x1="400" y1="315" x2="440" y2="315" stroke="#0A0A0F" stroke-width="2"/>
  <line x1="560" y1="315" x2="600" y2="315" stroke="#0A0A0F" stroke-width="2"/>
  <!-- Handwritten notes (text) -->
  <path d="M150 380 Q165 376 175 380 T200 376 Q215 376 230 382" stroke="#0A0A0F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M150 395 Q170 392 195 397 T245 395" stroke="#0A0A0F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M280 380 Q300 376 320 383 T360 380" stroke="#0A0A0F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M280 395 Q295 392 315 396" stroke="#0A0A0F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Marker tray -->
  <rect x="80" y="440" width="640" height="14" fill="#C8C8CD"/>
  <rect x="180" y="438" width="60" height="6" rx="3" fill="#FF6B5C"/>
  <rect x="260" y="438" width="60" height="6" rx="3" fill="#0A0A0F"/>
  <rect x="340" y="438" width="60" height="6" rx="3" fill="#0066CC"/>
  <rect x="420" y="438" width="60" height="6" rx="3" fill="#34C759"/>
  <!-- Floor -->
  <rect x="0" y="500" width="800" height="100" fill="#D2D2D7"/>
  <line x1="0" y1="540" x2="800" y2="540" stroke="rgba(0,0,0,0.05)"/>
  <line x1="0" y1="570" x2="800" y2="570" stroke="rgba(0,0,0,0.05)"/>
</svg>
